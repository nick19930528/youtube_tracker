# YouTube Tracker — PHP + MySQL 8
# 使用方式：
#   1. 複製 .env.example 為 .env 並依需要修改密碼與埠號
#   2. docker compose build && docker compose up -d
#   3. 瀏覽器開啟 http://localhost:${WEB_PORT:-8080}
#
# 資料庫：首次啟動會建立 volume 並執行 docker/mysql/import-schema.sh 匯入 config/youtube_tracker.sql

services:
  db:
    image: mysql:8.0
    container_name: yttracker-db
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: youtube_tracker
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/youtube_tracker.sql:/schema-import/youtube_tracker.sql:ro
      - ./docker/mysql/import-schema.sh:/docker-entrypoint-initdb.d/z99-import-schema.sh:ro
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      # 密碼須與 MYSQL_ROOT_PASSWORD 一致（Compose 內 $$ 會變成容器內的 $）
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  web:
    build: .
    container_name: yttracker-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: youtube_tracker
      DB_USER: ${MYSQL_USER:-appuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-appsecret}
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
