# YouTube Tracker — 僅 Web 容器，連線「正式／遠端」MySQL
# 使用方式：
#   1. 複製 .env.example 為 .env（可覆寫下方預設）
#   2. docker compose build && docker compose up -d
#   3. 瀏覽器開啟 http://localhost:${WEB_PORT:-8080}
#
# 連線參數亦可由 .env 覆寫；請勿將含真實密碼的 .env 提交版控。
# 若需本機 MySQL 容器，可另建 override 或還原舊版含 db 服務的 compose。

services:
  web:
    build: .
    container_name: yttracker-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: ${DB_HOST:-35.229.213.53}
      DB_PORT: ${DB_PORT:-3307}
      DB_NAME: ${DB_NAME:-mydb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - .:/var/www/html
